{% macro cf_pill_button(
id='',
text='',
onclick='',
href='',
extra_classes='',
extra_attrs='',
aria_label='',
disabled=False,
loading=False,
mobile_full=False,
icon='',
inline_style=''
) %}
<button id="{{ id }}" class="cf-pill-btn {{ extra_classes|default('') }} {{ 'cf-full-width' if mobile_full }}"
    style="{{ inline_style|default('') }}" {% if onclick and not disabled and not loading %}onclick="{{ onclick }}" {%
    endif %} {% if href and not disabled and not loading %}data-href="{{ href }}" {% endif %}
    aria-label="{{ aria_label or text }}" {% if disabled or loading %}disabled{% endif %} {% if loading
    %}data-loading="true" {% endif %} {{ extra_attrs|safe }}>
    <span class="cf-text-container">
        {% if icon %}<span class="cf-btn-icon">{{ icon | safe }}</span>{% endif %}
        <span class="cf-text">{{ text }}</span>
    </span>
</button>
{% endmacro %}
