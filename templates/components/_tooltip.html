{% macro cf_tooltip(
id='',
content='',
title='CareerForge AI Insight',
extra_classes='',
extra_attrs='',
inline_style=''
) %}
<div class="cf-tooltip-container {{ extra_classes|default('') }}" id="{{ id }}-tooltip-container"
    style="{{ inline_style }}" {{ extra_attrs|safe }}>
    <span class="cf-tooltip-trigger">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" class="w-4 h-4" style="width: 16px; height: 16px;">
            <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-width="2" stroke-linejoin="round"
                stroke-linecap="round"></path>
        </svg>
    </span>
    <div class="cf-tooltip-content">
        <div class="cf-tooltip-header">
            <h3 class="cf-tooltip-title">{{ title }}</h3>
        </div>
        <p class="cf-tooltip-text">{{ content }}</p>
    </div>
</div>
{% endmacro %}
