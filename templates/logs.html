<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Logs – CareerForge AI</title>
    <link rel="stylesheet" href="/static/style.css" />
    <style>
        .logs-page {
            max-width: 960px;
            margin: 60px auto 48px;
            padding: 0 20px;
        }

        .logs-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .logs-header h2 {
            font-family: var(--font-display);
            font-size: 1.6rem;
        }

        .log-panel {
            background: var(--bg-glass);
            border: 1px solid var(--bg-glass-border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
            padding: 24px;
            text-align: left;
            max-height: 600px;
            overflow-y: auto;
        }

        .log-line {
            font-family: 'Courier New', monospace;
            font-size: .78rem;
            padding: 4px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            line-height: 1.6;
            color: var(--text-muted);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-line:nth-child(even) {
            background: rgba(255, 255, 255, .02);
        }

        .log-line:last-child {
            border-bottom: none;
        }

        .log-line.level-error {
            color: var(--accent-danger);
            background: rgba(255, 77, 109, .04);
        }

        .log-line.level-warning {
            color: var(--accent-warn);
            background: rgba(255, 182, 39, .04);
        }

        .empty-logs {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
    <div class="grain-overlay"></div>

    <div class="logs-page">
        <div class="logs-header">
            <h2><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="22" height="22"
                    style="vertical-align:-4px">
                    <rect x="4" y="2" width="16" height="20" rx="2" />
                    <line x1="8" y1="6" x2="16" y2="6" />
                    <line x1="8" y1="10" x2="16" y2="10" />
                    <line x1="8" y1="14" x2="12" y2="14" />
                </svg> System <span class="gradient-text">Logs</span></h2>
            <div>
                <a href="/admin" class="btn btn-outline" style="padding:8px 18px;font-size:.82rem">&larr; Admin</a>
                <a href="/logout" class="btn btn-outline" style="padding:8px 18px;font-size:.82rem;margin-left:8px"><svg
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"
                        style="vertical-align:-2px">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg> Logout</a>
            </div>
        </div>
        <p class="section-desc" style="margin-bottom:20px;text-align:center">Last 100 log entries (newest at bottom)</p>

        <div class="log-panel">
            {% if log_lines %}
            {% for line in log_lines %}
            <div
                class="log-line {% if 'ERROR' in line %}level-error{% elif 'WARNING' in line %}level-warning{% endif %}">
                {{ line.strip() }}</div>
            {% endfor %}
            {% else %}
            <div class="empty-logs">No log entries found.</div>
            {% endif %}
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
