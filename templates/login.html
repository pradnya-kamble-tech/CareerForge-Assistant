<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login – CareerForge AI Resume Intelligence System" />
    <title>Login – CareerForge AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <!-- Ambient background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">⚡ CareerForge</div>
            <h1 class="auth-title">Welcome <span class="gradient-text">Back</span></h1>
            <p class="auth-subtitle">Login to your account to continue</p>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash-msg flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="/login" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required
                        autocomplete="email" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required
                        autocomplete="current-password" />
                </div>

                <button type="submit" class="btn btn-primary auth-btn">Login</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="/register" class="auth-link">Register here</a>
            </p>
        </div>
    </div>
</body>

</html>
